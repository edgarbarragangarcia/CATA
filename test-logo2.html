<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #F5E6D3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  svg { width: 400px; height: 400px; }
</style>
</head>
<body>
  <svg viewBox="-50 -50 100 100">
    <!-- Grid -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#ddd" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="40" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
    <circle cx="0" cy="0" r="20" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
    
    <!-- C Shape -->
    <path d="M 32,-24 
             A 40 40 0 0 0 -40 0 
             A 40 40 0 0 0 25 25 
             C 25 15, 10 15, -20 5" 
          fill="none" stroke="#0B2545" stroke-width="4.5" stroke-linecap="round"/>
          
    <!-- A Shape -->
    <path d="M 0,-15 L -16,18 M 0,-15 L 16,18" 
          fill="none" stroke="#FF5E36" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot -->
    <circle cx="0" cy="0" r="2.5" fill="#FF5E36"/>
  </svg>
</body>
</html>
